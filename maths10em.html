<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNest</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="grandParent">
        <div class="container">
            <h2 class="title">Choose Subject</h2>
            <div class="buttoncontainer">
                <button onclick="window.location.href='https://drive.google.com/file/d/1uzjSgcs_wOvqpjdZeztSZrWT6y_4Dz2u/preview'" class="btns" id="bbtn1">Real Numbers</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1rpjYgJzoGc_3nArlDM0ePr-n4Y78K_G_/preview'" class="btns" id="bbtn2">Polynomials</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1h-5ZlUQJwhz1hwvoxZZ55epreVYtIRFk/preview'" class="btns" id="bbtn3">Pair of Linear Equations in Two Variables</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1USZMn5Jc47yI_a92v15LF2tnUreg5o5g/preview'" class="btns" id="bbtn4">Quadratic Equations</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1FPeR2-YMGVHUcNxspY0rtcHh4etTXL45/preview'" class="btns" id="bbtn5">Arithmetic Progressions</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1YhgPsgAIC3Wg_lS8Af9quxT4YUJ0RAHa/preview'" class="btns" id="bbtn6">Triangles</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/17qKsnFvTJOuAsrFAiH0zFpPjIFvEOcWa/preview'" class="btns" id="bbtn7">Coordinate Geometry</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1jDMaokCrgVT-FO_ydkaGtn88i2gBNUMo/preview'" class="btns" id="bbtn8">Introduction to Trigonometry</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1xF89i5dRvYBWAHw9eaZAEHaI0mbnELkV/preview'" class="btns" id="bbtn9">Some Applications of Trigonometry</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1PtcRXZecYrjqOvSTGusAD0RKodFUEt22/preview'" class="btns" id="bbtn10">Circles</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1XAF2_RA5CcHI9lnMnY896BqQJoalOE0n/preview'" class="btns" id="bbtn11">Area Related to Circles</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1WkINmuV_uPG-G6KiRk1Gljw0trcnVgJK/preview'" class="btns" id="bbtn12">Surface Areas and Volumes</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1hRjowlJ_uJls9Bo2TLj64oOZjgkUQV1o/preview'" class="btns" id="bbtn13">Statistics</button>
                <button onclick="window.location.href='https://drive.google.com/file/d/1ymgotcVFaGVpNPCyUsJKE6c1ZqICiYFJ/preview'" class="btns" id="bbtn14">Probability</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
